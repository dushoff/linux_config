bindsym Mod1+Shift+p exec /home/dushoff/bin/scr/goscreen 0 0
bindsym Mod1+Shift+o exec goscreen 0 0
bindsym Mod1+Shift+t exec swaymsg '[app_id="foot"] focus'
bindsym Mod1+Shift+x exec swaymsg '[app_id="firefox"] focus'

