# vim: ft=i3config

## sup: basic navigation and i3 manipulation
## I'm thinking of trying it for basic, navigation-like things

## sup+Shift: i3 movement and basic tasks
## Doesn't quite work for arrows because too many levels
## Unless I try to bond with the brackets

## sup+alt:

## sup+alt: window searching

bindsym $sup+Return exec alacritty

bindsym $sup+a focus parent
bindsym $sup+Shift+a exec $spin arrive
bindsym $alt+Shift+a focus child
bindsym Ctrl+Shift+a exec --no-startup-id bash -c 'sleep 0.3 && gnome-screenshot -a'

bindsym $sup+b layout tabbed
bindsym $sup+Shift+b split v, layout tabbed

bindsym $alt+Shift+c exec i3-msg '[class="Google-chrome" title="Calendar"] focus'

bindsym $sup+d exec $menu
bindsym $sup+Shift+d exec $winlist
bindsym $alt+Shift+d exec gowin.sh focus Downloads

bindsym $sup+e exec --no-startup-id "$scripts/wstab.sh Evince evince"
bindsym $sup+Shift+e layout toggle split
## bindsym $sup+Shift+e exec i3-nagbar -t warning -m 'Exit?' -B 'Yes' 'i3-msg exit'

bindsym $sup+f fullscreen

bindsym $sup+h exec $spin tech/config.rwindow.view
bindsym $alt+Ctrl+h exec --no-startup-id pactl $sink $headphones
bindsym $alt+Shift+h exec i3-msg '[class="Google-chrome" title="Chat"] focus'

bindsym $sup+i exec --no-startup-id "i3-msg 'append_layout $here/workspace.json'"; exec $term; exec google-chrome

bindsym $sup+j exec gowin.sh focus Planning "gj"
bindsym $alt+Shift+j exec gowin.sh focus Planning "gj"

bindsym $sup+k exec pkill -f -SIGHUP dictate.sh
bindsym $sup+Shift+k exec bash -c 'pkill -SIGINT dictate.sh || $scripts/dictate.sh'
bindsym Ctrl+$sup+k exec pkill -f -SIGINT dictate.sh
bindsym Ctrl+Shift+k exec pkill -f -SIGTERM dictate.sh

## bindsym $sup+l exec i3-msg '[con_mark="mainterm"] focus'
## bindsym $sup+Shift+l mark mainterm
bindsym $sup+l exec bash -ic dgol
bindsym Ctrl+$sup+l exec bash -ic "ddel && dgol"

bindsym $sup+m exec i3-msg '[con_mark="mainmail"] focus'
bindsym $sup+Shift+m mark mainmail
bindsym $alt+Shift+m exec i3-msg '[class="Google-chrome" title="Gmail"] focus'
## donotbind Ctrl-Shift+m TEAMS mute/

bindsym $sup+p exec gowin.sh focus Planning
bindsym $alt+Shift+p exec gowin.sh focus Planning "gkgZgvMM"

bindsym $alt+Shift+q exec gowin.sh focus Planning "gkG GVMM"
bindsym Ctrl+Shift+q kill

bindsym $sup+r mode "resize"
bindsym $sup+Shift+r restart
bindsym Ctrl+$alt+r exec gowin.sh focus Planning "gr"
## donotbind Ctrl+Shift+r CHROME reload

bindsym $sup+s layout stacking
bindsym $sup+Shift+s exec bash -ic "spin mainSync || beaver"
bindsym $sup+Ctrl+s exec $spin mainSync
bindsym $alt+Ctrl+s exec --no-startup-id pactl $sink $speaker

bindsym $sup+t exec i3-msg '[class="$Term" workspace="__focused__"] focus'

bindsym $sup+w exec --no-startup-id "$scripts/wstab.sh Google-chrome google-chrome
bindsym $sup+Shift+w exec i3-msg 'exec google-chrome'

bindsym $sup+x exec $spin main.space
## bindsym $sup+Shift+x exec i3-msg 'exec firefox'
## bindsym $sup+x exec i3-msg '[class="firefox" workspace="__focused__"] focus'

######################################################################

## Directions
bindsym $sup+Down focus down
bindsym $sup+Shift+Down move down
bindsym $sup+Up focus up
bindsym $sup+Shift+Up move up
bindsym $sup+Left focus left
bindsym $sup+Shift+Left move left
bindsym $sup+Right focus right
bindsym $sup+Shift+Right move right

## Not really used
bindsym $sup+bracketright workspace next
bindsym $sup+bracketleft workspace prev
bindsym $sup+Shift+bracketright move container to workspace next
bindsym $sup+Shift+bracketleft move container to workspace prev
bindsym $sup+Ctrl+bracketright move container to workspace next; workspace next
bindsym $sup+Ctrl+bracketleft move container to workspace prev; workspace prev

bindsym $alt+Ctrl+Right workspace next
bindsym $alt+Ctrl+Left workspace prev
bindsym $sup+Ctrl+Right move container to workspace next; workspace next
bindsym $sup+Ctrl+Left move container to workspace prev; workspace prev

bindsym $alt+Tab focus next
bindsym $sup+Tab workspace back_and_forth

bindsym $sup+minus scratchpad show
bindsym $sup+Shift+minus move scratchpad
bindsym $sup+space focus mode_toggle
bindsym $sup+Shift+space floating toggle

bindsym XF86MonBrightnessUp exec --no-startup-id brightnessctl set 10%+
bindsym XF86MonBrightnessDown exec --no-startup-id brightnessctl set 10%-

######################################################################


