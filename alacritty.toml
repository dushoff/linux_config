[cursor]
style = { shape = "Block", blinking = "Always" }
blink_interval = 750

[font]
size = 24
## import = ["~/.config/alacritty/themes/themes/solarized_osaka_day.toml"]
# Colors (Solarized Osaka: Day)
# Source https://github.com/craftzdog/solarized-osaka.nvim

# Default colors
[colors.primary]
background = '#fdf5e0'
foreground = '#586e74'

# Normal colors
[colors.normal]
black   = '#073642'
red     = '#dc322f'
green   = '#859900'
yellow  = '#b58900'
blue    = '#268bd2'
magenta = '#d33682'
cyan    = '#2aa198'
white   = '#eee8d5'

# Bright colors
[colors.bright]
black   = '#4c4c4c'
red     = '#cb4b16'
green   = '#586e75'
yellow  = '#657b83'
blue    = '#839496'
magenta = '#6c71c4'
cyan    = '#93a1a1'
white   = '#fdf6e3'


